<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>変更履歴</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .navbar {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 16px;
            transition: color 0.3s;
        }
        .navbar a:hover {
            color: #667eea;
        }
        .navbar a.home {
            font-weight: bold;
            font-size: 18px;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 60px);
            padding: 40px 20px;
        }
        .changelog-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 700px;
            width: 100%;
        }
        h1 {
            color: #667eea;
            margin-top: 0;
            text-align: center;
            font-size: 32px;
        }
        .changelog-entries {
            margin-top: 30px;
        }
        .entry-date {
            font-size: 18px;
            font-weight: bold;
            color: #764ba2;
            margin-top: 25px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        .entry-item {
            margin-left: 20px;
            margin-bottom: 12px;
            padding: 12px;
            background-color: #f8f9fa;
            border-left: 3px solid #667eea;
            border-radius: 3px;
        }
        .entry-time {
            color: #667eea;
            font-weight: bold;
            font-size: 14px;
        }
        .entry-description {
            color: #333;
            margin-top: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="index.html" class="home">ホーム</a>
            <div>
                <a href="kg-i.html">KG I</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="changelog-container">
            <h1>変更履歴</h1>
            <div class="changelog-entries">
                <div class="entry-date">2026年3月14日</div>
                <div class="entry-item">
                    <span class="entry-time">11:21</span>
                    <div class="entry-description">KPI初期化を0に修正し、変更履歴追跡システムを追加しました。</div>
                </div>
                <div class="entry-item">
                    <span class="entry-time">11:20</span>
                    <div class="entry-description">ホームページを KG I 進捗ダッシュボードに変換しました。</div>
                </div>
                <div class="entry-item">
                    <span class="entry-time">19:10</span>
                    <div class="entry-description">ホームページから不要なリンク（自己紹介、商品紹介、学生検索、To Doリスト）を削除しました。ユーザーは KG I ページへ直接アクセスできます。</div>
                </div>
                <div class="entry-item">
                    <span class="entry-time">19:10</span>
                    <div class="entry-description">変更履歴ページを作成しました。これからの変更内容を時系列に記録していきます。</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
