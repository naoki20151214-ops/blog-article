<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>挨拶ページ</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }
        .greeting-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            text-align: center;
        }
        .greeting-text {
            font-size: 18px;
            line-height: 1.8;
            color: #333;
            margin: 20px 0;
        }
        h1 {
            color: #667eea;
            margin-top: 0;
        }
    </style>
</head>
<body>
    <div class="greeting-container">
        <h1>ようこそ</h1>
        <p class="greeting-text">
            おはようございます！本日も皆様のご利用をありがとうございます。これからも心をこめてサービスを提供させていただきます。何かご質問がございましたら、お気軽にお問い合わせください。本当にありがとうございました！
        </p>
    </div>
</body>
</html>
