<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ホーム</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .navbar {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 16px;
            transition: color 0.3s;
        }
        .navbar a:hover {
            color: #667eea;
        }
        .navbar a.home {
            font-weight: bold;
            font-size: 18px;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 60px);
            padding: 40px 20px;
        }
        .home-container {
            background: white;
            padding: 50px 40px;
            border-radius: 10px;

            max-width: 600px;
            text-align: center;
        }

            color: #667eea;

        }
        .welcome-text {
            font-size: 16px;

        .navigation-links {

        }

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .nav-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        /* Dashboard Styles */
        #kgi-dashboard {
            max-width: 1200px;
            width: 100%;
        }
        .dashboard-title {
            text-align: center;
            color: white;
            font-size: 32px;
            margin-bottom: 40px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }
        .kgi-progress-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            margin-bottom: 40px;
            text-align: center;
        }
        .kgi-progress-section h2 {
            color: #667eea;
            margin: 0 0 20px 0;
            font-size: 20px;
        }
        .progress-bar-container {
            width: 100%;
            height: 30px;
            background-color: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
        }
        .kgi-progress-percentage {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .kpi-cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        .kpi-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            border-left: 4px solid #667eea;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s, border-left-color 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
            position: relative;
        }
        .kpi-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border-left-color: #764ba2;
        }
        .kpi-card.importance-a {
            border-left-color: #764ba2;
        }
        .kpi-card.importance-b {
            border-left-color: #667eea;
        }
        .kpi-card.importance-c {
            border-left-color: #999;
        }
        .kpi-card:hover.importance-a {
            border-left-color: #9d63c9;
        }
        .kpi-card:hover.importance-c {
            border-left-color: #bbb;
        }
        .kpi-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .kpi-header h3 {
            margin: 0;
            color: #333;
            font-size: 18px;
        }
        .kpi-icon {
            margin-right: 8px;
        }
        .importance-badge {
            background-color: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }
        .kpi-progress-info {
            text-align: left;
        }
        .progress-text {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
        .kpi-progress-bar {
            width: 100%;
            height: 20px;
            background-color: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .kpi-progress-bar-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
        }
        .progress-percentage {
            font-size: 16px;
            font-weight: bold;
            color: #667eea;
            text-align: right;
        }
        /* KPI Contribution Visualization Styles */
        .kgi-contribution-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            margin-bottom: 40px;
        }
        .kgi-contribution-section h3 {
            color: #667eea;
            margin: 0 0 25px 0;
            font-size: 18px;
            text-align: center;
        }
        .contribution-breakdown {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            height: 80px;
            margin-bottom: 20px;
        }
        .contribution-bar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
        }
        .contribution-bar {
            width: 100%;
            height: 100%;
            background-color: #e0e0e0;
            border-radius: 5px 5px 0 0;
            overflow: hidden;
            position: relative;
            min-height: 20px;
        }
        .contribution-bar-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.5s ease;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 5px;
            font-size: 12px;
            font-weight: bold;
            color: white;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);

        .contribution-label {
            font-size: 13px;
            color: #333;
            margin-top: 8px;
            font-weight: 500;
            text-align: center;
            min-height: 30px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        .contribution-label-name {
            font-weight: 600;
        }
        .contribution-label-weight {
            font-size: 11px;
            color: #999;
        }

    <!-- Firebase 初期化後に読み込む（順序重要） -->
    <script src="js/utils/FirebaseManager.js"></script>
    <script src="js/utils/ConfigManager.js"></script>
    <script src="js/utils/KGIStore.js"></script>
    <script src="js/utils/MigrationHelper.js"></script>

    <script>
        // Initialize ConfigManager and KGIStore
        let configManager;
        let kgiStore;

        async function initializeSystem() {
            try {
                console.log('🔄 initializeSystem() 開始...');

                // 1. FirebaseManager が Firebase Firestore を初期化するまで待機
                console.log('🔄 FirebaseManager.ensureInitialized() 待機中...');
                await FirebaseManager.ensureInitialized();
                console.log('✅ FirebaseManager 準備完了');

                // 2. ConfigManager を初期化（async 処理）
                console.log('🔄 ConfigManager インスタンス化中...');
                configManager = new ConfigManager();
                console.log('🔄 configManager.initialize() 待機中...');
                await configManager.initialize();
                console.log('✅ ConfigManager 準備完了');

                // 3. KGIStore を初期化
                console.log('🔄 KGIStore インスタンス化中...');
                kgiStore = new KGIStore(configManager);
                console.log('✅ KGIStore 準備完了');

                console.log('✅ initializeSystem() 完了');

            } catch (error) {
                console.error('❌ initializeSystem() でエラー発生:', error);
                console.error('エラー詳細:', {
                    message: error.message,
                    code: error.code,
                    stack: error.stack
                });
                console.error('⚠️ Firebase, ConfigManager, KGIStore の初期化に失敗しました');

                // エラーをユーザーに通知
                alert('❌ システム初期化エラー\n\n' +
                      'Firebase または ConfigManager の初期化に失敗しました。\n\n' +
                      'ページをリロードしてください。\n\n' +
                      'エラー詳細: ' + error.message);

                throw error;  // 初期化エラーは上位に throw
            }
        }

        // KPI Configuration
        const kpiConfig = {
            vocab: {
                target: 100,
                storageKey: 'kgi_vocab',
                importanceKey: 'kgi_importance_vocab',
                name: '英単語',
                icon: '📚'
            },
            grammar: {
                target: 50,
                storageKey: 'kgi_grammar',
                importanceKey: 'kgi_importance_grammar',
                name: '英文法',
                icon: '📖'
            },
            practice: {
                target: 3,
                storageKey: 'kgi_practice',
                importanceKey: 'kgi_importance_practice',
                name: '過去問',
                icon: '✏️'
            }
        };

        // Default Importance Levels
        const defaultImportance = {
            vocab: 'B',
            grammar: 'B',
            practice: 'B'
        };

        /**
         * Get KPI data from ConfigManager/KGIStore
         */
        function getDashboardData() {
            const data = {};
            const kpis = kgiStore.getKPIsForCurrentKGI();

            kpis.forEach(kpi => {
                data[kpi.id] = {
                    id: kpi.id,
                    current: kpi.current,
                    target: kpi.target,
                    importance: kpi.importance,
                    name: kpi.name,
                    icon: kpi.emoji,
                    unit: kpi.unit
                };
            });

            return data;
        }

        /**
         * Convert ABC importance levels to weights
         */
        function convertABCToWeights(dashboardData) {
            const weights = { A: 3, B: 2, C: 1 };
            const importanceMap = {};
            let totalWeight = 0;

            for (const [kpiId, data] of Object.entries(dashboardData)) {
                const weight = weights[data.importance] || 2;
                importanceMap[kpiId] = weight;
                totalWeight += weight;
            }

            const percentages = {};
            for (const [kpiId, weight] of Object.entries(importanceMap)) {
                percentages[kpiId] = (weight / totalWeight) * 100;
            }
            return percentages;
        }

        /**
         * Calculate KGI overall progress
         */
        function calculateKgiProgress(dashboardData) {
            const importancePercentages = convertABCToWeights(dashboardData);
            let totalProgress = 0;

            for (const [kpiId, data] of Object.entries(dashboardData)) {
                const kpiProgress = (data.current / data.target) * 100;
                const weightedProgress = kpiProgress * (importancePercentages[kpiId] / 100);
                totalProgress += weightedProgress;
            }

            return Math.round(totalProgress);
        }

        /**
         * Update KGI progress bar
         */
        function updateKgiProgressBar(percentage) {
            const progressBar = document.getElementById('kgi-progress-bar');
            const percentageDisplay = document.getElementById('kgi-progress-percentage');
            if (progressBar) {
                progressBar.style.width = percentage + '%';
            }
            if (percentageDisplay) {
                percentageDisplay.textContent = percentage + '%';
            }
        }

        /**
         * Create contribution visualization
         */
        function createContributionVisualization(dashboardData) {
            const breakdown = document.getElementById('contribution-breakdown');
            if (!breakdown) return;

            breakdown.innerHTML = '';

            const importancePercentages = convertABCToWeights(dashboardData);

            for (const [kpiId, data] of Object.entries(dashboardData)) {
                const weight = importancePercentages[kpiId];
                const kpiProgress = (data.current / data.target) * 100;
                const contribution = (kpiProgress * weight) / 100;

                const wrapper = document.createElement('div');
                wrapper.className = 'contribution-bar-wrapper';

                const barContainer = document.createElement('div');
                barContainer.className = 'contribution-bar';

                const barFill = document.createElement('div');
                barFill.className = 'contribution-bar-fill';
                barFill.style.height = weight + '%';
                barFill.textContent = Math.round(weight) + '%';

                barContainer.appendChild(barFill);

                const label = document.createElement('div');
                label.className = 'contribution-label';
                label.innerHTML = `
                    <span class="contribution-label-name">${data.icon} ${data.name}</span>
                    <span class="contribution-label-weight">${data.importance}</span>
                `;

                wrapper.appendChild(barContainer);
                wrapper.appendChild(label);
                breakdown.appendChild(wrapper);
            }
        }

        /**
         * Render KPI cards dynamically
         */
        function renderKpiCards(dashboardData) {
            const cardsGrid = document.getElementById('kpi-cards-grid');
            if (!cardsGrid) return;

            cardsGrid.innerHTML = '';

            const importancePercentages = convertABCToWeights(dashboardData);

            for (const [kpiId, data] of Object.entries(dashboardData)) {
                const percentage = Math.round((data.current / data.target) * 100);
                const weight = importancePercentages[kpiId];
                const contribution = Math.round((percentage * weight) / 100);

                const card = document.createElement('a');
                card.href = 'kg-i.html';
                card.className = `kpi-card importance-${data.importance.toLowerCase()}`;

                card.innerHTML = `
                    <div class="kpi-header">
                        <h3><span class="kpi-icon">${data.icon}</span> ${data.name}</h3>
                        <div class="importance-badge">${data.importance}</div>
                    </div>
                    <div class="kpi-progress-info">
                        <div class="progress-text">${data.current} / ${data.target}</div>
                        <div class="kpi-progress-bar">
                            <div class="kpi-progress-bar-fill" style="width: ${percentage}%"></div>
                        </div>
                        <div class="progress-percentage">${percentage}%</div>
                        <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid #e0e0e0; font-size: 12px; color: #999;">
                            KGI貢献度: <strong style="color: #667eea;">${contribution}%</strong>
                        </div>
                    </div>
                `;

                cardsGrid.appendChild(card);
            }
        }

        /**
         * Initialize dashboard
         */
        async function initDashboard() {
            // Initialize system first time
            if (!configManager) {
                console.log('🔄 configManager が未初期化。initializeSystem() を呼び出します...');
                await initializeSystem();
                console.log('✅ initDashboard: initializeSystem() 完了');
            }

            // Render KGI selector
            updateKGISelector();

            // Render dashboard
            const dashboardData = getDashboardData();
            const kgiProgress = kgiStore.calculateKGIProgress();
            updateKgiProgressBar(kgiProgress);
            createContributionVisualization(dashboardData);
            // renderKpiCards(dashboardData); // KPI cards hidden
        }

        /**
         * Update KGI selector dropdown
         */
        function updateKGISelector() {
            const kgis = configManager.getKGIs();
            const selector = document.getElementById('kgi-selector');
            const selectorSection = document.getElementById('kgi-selector-section');

            // Only show selector if multiple KGIs exist
            if (kgis.length > 1) {
                selectorSection.style.display = 'block';
                selector.innerHTML = '';
                kgis.forEach(kgi => {
                    const option = document.createElement('option');
                    option.value = kgi.id;
                    option.textContent = (kgi.emoji || '🎯') + ' ' + kgi.name;
                    if (kgi.id === configManager.getCurrentKgiId()) {
                        option.selected = true;
                    }
                    selector.appendChild(option);
                });
            } else {
                selectorSection.style.display = 'none';
            }
        }

        /**
         * Switch KGI
         */
        function switchKGI(kgiId) {
            kgiStore.selectKGI(kgiId);
            initDashboard();
        }

        /**
         * Open KGI creation modal
         */
        function openKGIModal() {
            const modal = document.getElementById('kgi-creation-modal');
            modal.style.display = 'flex';
            document.getElementById('kgi-name-input').focus();
        }

        /**
         * Close KGI creation modal
         */
        function closeKGIModal() {
            const modal = document.getElementById('kgi-creation-modal');
            modal.style.display = 'none';
            document.getElementById('kgi-creation-form').reset();
            document.getElementById('kgi-emoji-input').value = '🎯';
            // Reset emoji button selection
            document.querySelectorAll('#kgi-emoji-picker .emoji-btn').forEach(btn => {
                btn.style.borderColor = '#ddd';
                btn.style.background = 'white';
            });
            // Reset error message
            const errorDiv = document.getElementById('kgi-error-message');
            errorDiv.style.display = 'none';
            errorDiv.textContent = '';
        }

        /**
         * Select emoji for KGI
         */
        function selectKGIEmoji(element, emoji) {
            document.querySelectorAll('#kgi-emoji-picker .emoji-btn').forEach(btn => {
                btn.style.borderColor = '#ddd';
                btn.style.background = 'white';
            });
            element.style.borderColor = '#667eea';
            element.style.background = '#e8eaf6';
            document.getElementById('kgi-emoji-input').value = emoji;
        }

        /**
         * Submit KGI creation form
         */
        async function submitKGI(event) {
            alert('submitKGI called');
            console.log('🔵 submitKGI called - button clicked');
            event.preventDefault();

            // 1️⃣ フォームから値を取得
            const name = document.getElementById('kgi-name-input').value;
            const emoji = document.getElementById('kgi-emoji-input').value;
            const description = document.getElementById('kgi-description-input').value;

            console.log('📋 Form values retrieved:', { name, emoji, description });

            // 入力値の検証
            if (!name || !emoji) {
                console.warn('❌ Validation failed - missing name or emoji');
                alert('KGI名と絵文字を両方選択してください。\n名前: ' + (name || '未入力') + '\n絵文字: ' + (emoji || '未選択'));
                return;
            }

            console.log('✓ Validation passed');

            try {
                console.log('📝 KGI 作成開始:', { name, emoji });

                // Check if dependencies are initialized
                if (!configManager) {
                    console.error('❌ configManager is not initialized');
                    alert('エラー: システムの初期化に失敗しています。ページをリロードしてください。');
                    return;
                }

                // 2️⃣ ConfigManager.addKGI() を呼び出し
                // この関数内で Firestore への保存が行われる
                console.log('🔄 Calling configManager.addKGI()...');
                const newKGI = await configManager.addKGI({
                    name,
                    emoji,
                    description
                });

                console.log('✅ KGI が正常に作成され、Firestore に保存されました:', newKGI.id);
                alert('✅ KGI「' + name + '」を作成しました！\nKGI管理ページに移動します...');

                // 3️⃣ ローカル状態を更新（KGI を選択状態にする）
                if (kgiStore) {
                    kgiStore.selectKGI(newKGI.id);
                    console.log('✓ KGI selected in kgiStore');
                } else {
                    console.warn('⚠️ kgiStore not available, skipping selectKGI');
                }

                // 4️⃣ モーダルを閉じてフォームをリセット
                closeKGIModal();
                console.log('✓ Modal closed');

                // 5️⃣ KPI 作成ページへリダイレクト
                console.log('🔗 Redirecting to kg-i.html with kgiId:', newKGI.id);
                window.location.href = 'kg-i.html?kgiId=' + newKGI.id;

            } catch (error) {
                console.error('❌ KGI 作成エラー:', error);
                console.error('Error code:', error.code);
                console.error('Error message:', error.message);
                console.error('Error stack:', error.stack);

                // エラーメッセージをモーダル内に表示
                const errorDiv = document.getElementById('kgi-error-message');
                let errorTitle = '❌ エラーが発生しました';
                let errorMsg = error.message || error.toString();

                // Firestore エラーの詳細を表示
                if (error.code === 'permission-denied') {
                    errorTitle = '❌ アクセス権限エラー';
                    errorMsg = 'Firestore へのアクセス権限がありません。認証を確認してください。';
                    alert('❌ Firestore へのアクセス権限がありません。\n\n認証を確認してください。');
                } else if (error.code === 'unauthenticated') {
                    errorTitle = '❌ 認証エラー';
                    errorMsg = '認証が必要です。ページをリロードして再度試してください。';
                    alert('❌ 認証が必要です。\n\nページをリロードして再度試してください。');
                } else if (error.message && error.message.includes('Invalid')) {
                    errorTitle = '❌ 入力データが無効';
                    errorMsg = error.message;
                    alert('❌ 入力データが無効です。\n\nエラー詳細: ' + error.message);
                } else {
                    alert('❌ KGI 作成に失敗しました。\n\nエラー: ' + errorMsg + '\n\nコンソールを確認してください。');
                }

                // モーダル内にエラーメッセージを表示
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '<strong>' + errorTitle + '</strong><br>' + errorMsg;
            }
        }

        /**
         * Handle storage changes (importance updates from kg-i.html)
         */
        window.addEventListener('storage', (event) => {
            // Check if any importance key was changed
            const importanceKeys = Object.values(kpiConfig).map(config => config.importanceKey);
            if (importanceKeys.includes(event.key) || !event.key) {
                // Reinitialize dashboard on importance change
                initDashboard();
            }
        });

        // Initialize on page load
        window.addEventListener('load', async () => {
            console.log('📍 load イベント発火');
            await initDashboard();
            console.log('📍 initDashboard() 完了');
        });

        // Reinitialize when page gains focus (returning from kg-i.html)
        window.addEventListener('focus', async () => {
            console.log('📍 focus イベント発火');
            await initDashboard();
            console.log('📍 initDashboard() 完了');
        });
    </script>
</body>
</html>
