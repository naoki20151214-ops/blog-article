<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ホーム</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .navbar {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 16px;
            transition: color 0.3s;
        }
        .navbar a:hover {
            color: #667eea;
        }
        .navbar a.home {
            font-weight: bold;
            font-size: 18px;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 60px);
            padding: 40px 20px;
        }
        .home-container {
            background: white;
            padding: 50px 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            text-align: center;
        }
        h1 {
            color: #667eea;
            margin-top: 0;
            font-size: 36px;
        }
        .welcome-text {
            font-size: 16px;
            line-height: 1.8;
            color: #666;
            margin: 20px 0 30px 0;
        }
        .navigation-links {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .nav-link {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .nav-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="index.html" class="home">ホーム</a>
            <div>
                <a href="about.html">自己紹介</a>
                <a href="products.html">商品紹介</a>
                <a href="search-app.html">学生検索</a>
                <a href="todo-list.html">To Doリスト</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="home-container">
            <h1>ようこそ</h1>
            <p class="welcome-text">
                このサイトへようこそ！私たちについてもっと知りたい方は、自己紹介ページをご覧ください。また、当社の商品についてはこちらからご確認いただけます。さらに、学生検索システムで生徒の成績情報も確認できます。
            </p>
            <div class="navigation-links">
                <a href="about.html" class="nav-link">自己紹介</a>
                <a href="products.html" class="nav-link">商品紹介</a>
                <a href="search-app.html" class="nav-link">学生検索</a>
                <a href="todo-list.html" class="nav-link">To Doリスト</a>
            </div>
        </div>
    </div>
</body>
</html>
