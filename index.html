<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ホーム</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .navbar {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 16px;
            transition: color 0.3s;
        }
        .navbar a:hover {
            color: #667eea;
        }
        .navbar a.home {
            font-weight: bold;
            font-size: 18px;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 60px);
            padding: 40px 20px;
        }
        .home-container {
            background: white;
            padding: 50px 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            text-align: center;
        }
        h1 {
            color: #667eea;
            margin-top: 0;
            font-size: 36px;
        }
        .welcome-text {
            font-size: 16px;
            line-height: 1.8;
            color: #666;
            margin: 20px 0 30px 0;
        }
        .navigation-links {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .nav-link {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .nav-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        /* Dashboard Styles */
        #kgi-dashboard {
            max-width: 1200px;
            width: 100%;
        }
        .dashboard-title {
            text-align: center;
            color: white;
            font-size: 32px;
            margin-bottom: 40px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }
        .kgi-progress-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            margin-bottom: 40px;
            text-align: center;
        }
        .kgi-progress-section h2 {
            color: #667eea;
            margin: 0 0 20px 0;
            font-size: 20px;
        }
        .progress-bar-container {
            width: 100%;
            height: 30px;
            background-color: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
        }
        .kgi-progress-percentage {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .kpi-cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        .kpi-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            border-left: 4px solid #667eea;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s, border-left-color 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
            position: relative;
        }
        .kpi-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border-left-color: #764ba2;
        }
        .kpi-card.importance-a {
            border-left-color: #764ba2;
        }
        .kpi-card.importance-b {
            border-left-color: #667eea;
        }
        .kpi-card.importance-c {
            border-left-color: #999;
        }
        .kpi-card:hover.importance-a {
            border-left-color: #9d63c9;
        }
        .kpi-card:hover.importance-c {
            border-left-color: #bbb;
        }
        .kpi-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .kpi-header h3 {
            margin: 0;
            color: #333;
            font-size: 18px;
        }
        .kpi-icon {
            margin-right: 8px;
        }
        .importance-badge {
            background-color: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }
        .kpi-progress-info {
            text-align: left;
        }
        .progress-text {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
        .kpi-progress-bar {
            width: 100%;
            height: 20px;
            background-color: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .kpi-progress-bar-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
        }
        .progress-percentage {
            font-size: 16px;
            font-weight: bold;
            color: #667eea;
            text-align: right;
        }
        /* KPI Contribution Visualization Styles */
        .kgi-contribution-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            margin-bottom: 40px;
        }
        .kgi-contribution-section h3 {
            color: #667eea;
            margin: 0 0 25px 0;
            font-size: 18px;
            text-align: center;
        }
        .contribution-breakdown {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            height: 80px;
            margin-bottom: 20px;
        }
        .contribution-bar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
        }
        .contribution-bar {
            width: 100%;
            height: 100%;
            background-color: #e0e0e0;
            border-radius: 5px 5px 0 0;
            overflow: hidden;
            position: relative;
            min-height: 20px;
        }
        .contribution-bar-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.5s ease;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 5px;
            font-size: 12px;
            font-weight: bold;
            color: white;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }
        .contribution-label {
            font-size: 13px;
            color: #333;
            margin-top: 8px;
            font-weight: 500;
            text-align: center;
            min-height: 30px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        .contribution-label-name {
            font-weight: 600;
        }
        .contribution-label-weight {
            font-size: 11px;
            color: #999;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="index.html" class="home">ホーム</a>
            <div>
                <a href="kg-i.html">KG I</a>
                <a href="changelog.html">変更履歴</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="kgi-dashboard">
            <h1 class="dashboard-title">📊 KGI ダッシュボード</h1>
            <div class="kgi-progress-section">
                <h2>🎯 全体進捗</h2>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="kgi-progress-bar" style="width: 0%"></div>
                </div>
                <div class="kgi-progress-percentage" id="kgi-progress-percentage">0%</div>
            </div>
            <div class="kgi-contribution-section" id="contribution-section">
                <h3>📊 KPI別の加重貢献度</h3>
                <div class="contribution-breakdown" id="contribution-breakdown">
                    <!-- Contribution bars will be dynamically generated here -->
                </div>
            </div>
            <div class="kpi-cards-grid" id="kpi-cards-grid">
                <!-- KPI cards will be dynamically generated here -->
            </div>
        </div>
    </div>

    <script>
        // KPI Configuration
        const kpiConfig = {
            vocab: {
                target: 100,
                storageKey: 'kgi_vocab',
                importanceKey: 'kgi_importance_vocab',
                name: '英単語',
                icon: '📚'
            },
            grammar: {
                target: 50,
                storageKey: 'kgi_grammar',
                importanceKey: 'kgi_importance_grammar',
                name: '英文法',
                icon: '📖'
            },
            practice: {
                target: 3,
                storageKey: 'kgi_practice',
                importanceKey: 'kgi_importance_practice',
                name: '過去問',
                icon: '✏️'
            }
        };

        // Default Importance Levels
        const defaultImportance = {
            vocab: 'B',
            grammar: 'B',
            practice: 'B'
        };

        /**
         * Get KPI data from localStorage
         */
        function getDashboardData() {
            const data = {};
            for (const [kpiId, config] of Object.entries(kpiConfig)) {
                const current = parseInt(localStorage.getItem(config.storageKey)) || 0;
                const importance = localStorage.getItem(config.importanceKey) || defaultImportance[kpiId];
                data[kpiId] = {
                    current,
                    target: config.target,
                    importance,
                    name: config.name,
                    icon: config.icon
                };
            }
            return data;
        }

        /**
         * Convert ABC importance levels to weights
         */
        function convertABCToWeights(dashboardData) {
            const weights = { A: 3, B: 2, C: 1 };
            const importanceMap = {};
            let totalWeight = 0;

            for (const [kpiId, data] of Object.entries(dashboardData)) {
                const weight = weights[data.importance] || 2;
                importanceMap[kpiId] = weight;
                totalWeight += weight;
            }

            const percentages = {};
            for (const [kpiId, weight] of Object.entries(importanceMap)) {
                percentages[kpiId] = (weight / totalWeight) * 100;
            }
            return percentages;
        }

        /**
         * Calculate KGI overall progress
         */
        function calculateKgiProgress(dashboardData) {
            const importancePercentages = convertABCToWeights(dashboardData);
            let totalProgress = 0;

            for (const [kpiId, data] of Object.entries(dashboardData)) {
                const kpiProgress = (data.current / data.target) * 100;
                const weightedProgress = kpiProgress * (importancePercentages[kpiId] / 100);
                totalProgress += weightedProgress;
            }

            return Math.round(totalProgress);
        }

        /**
         * Update KGI progress bar
         */
        function updateKgiProgressBar(percentage) {
            const progressBar = document.getElementById('kgi-progress-bar');
            const percentageDisplay = document.getElementById('kgi-progress-percentage');
            if (progressBar) {
                progressBar.style.width = percentage + '%';
            }
            if (percentageDisplay) {
                percentageDisplay.textContent = percentage + '%';
            }
        }

        /**
         * Create contribution visualization
         */
        function createContributionVisualization(dashboardData) {
            const breakdown = document.getElementById('contribution-breakdown');
            if (!breakdown) return;

            breakdown.innerHTML = '';

            const importancePercentages = convertABCToWeights(dashboardData);

            for (const [kpiId, data] of Object.entries(dashboardData)) {
                const weight = importancePercentages[kpiId];
                const kpiProgress = (data.current / data.target) * 100;
                const contribution = (kpiProgress * weight) / 100;

                const wrapper = document.createElement('div');
                wrapper.className = 'contribution-bar-wrapper';

                const barContainer = document.createElement('div');
                barContainer.className = 'contribution-bar';

                const barFill = document.createElement('div');
                barFill.className = 'contribution-bar-fill';
                barFill.style.height = weight + '%';
                barFill.textContent = Math.round(weight) + '%';

                barContainer.appendChild(barFill);

                const label = document.createElement('div');
                label.className = 'contribution-label';
                label.innerHTML = `
                    <span class="contribution-label-name">${data.icon} ${data.name}</span>
                    <span class="contribution-label-weight">${data.importance}</span>
                `;

                wrapper.appendChild(barContainer);
                wrapper.appendChild(label);
                breakdown.appendChild(wrapper);
            }
        }

        /**
         * Render KPI cards dynamically
         */
        function renderKpiCards(dashboardData) {
            const cardsGrid = document.getElementById('kpi-cards-grid');
            if (!cardsGrid) return;

            cardsGrid.innerHTML = '';

            const importancePercentages = convertABCToWeights(dashboardData);

            for (const [kpiId, data] of Object.entries(dashboardData)) {
                const percentage = Math.round((data.current / data.target) * 100);
                const weight = importancePercentages[kpiId];
                const contribution = Math.round((percentage * weight) / 100);

                const card = document.createElement('a');
                card.href = 'kg-i.html';
                card.className = `kpi-card importance-${data.importance.toLowerCase()}`;

                card.innerHTML = `
                    <div class="kpi-header">
                        <h3><span class="kpi-icon">${data.icon}</span> ${data.name}</h3>
                        <div class="importance-badge">${data.importance}</div>
                    </div>
                    <div class="kpi-progress-info">
                        <div class="progress-text">${data.current} / ${data.target}</div>
                        <div class="kpi-progress-bar">
                            <div class="kpi-progress-bar-fill" style="width: ${percentage}%"></div>
                        </div>
                        <div class="progress-percentage">${percentage}%</div>
                        <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid #e0e0e0; font-size: 12px; color: #999;">
                            KGI貢献度: <strong style="color: #667eea;">${contribution}%</strong>
                        </div>
                    </div>
                `;

                cardsGrid.appendChild(card);
            }
        }

        /**
         * Initialize dashboard
         */
        function initDashboard() {
            const dashboardData = getDashboardData();
            const kgiProgress = calculateKgiProgress(dashboardData);
            updateKgiProgressBar(kgiProgress);
            createContributionVisualization(dashboardData);
            renderKpiCards(dashboardData);
        }

        /**
         * Handle storage changes (importance updates from kg-i.html)
         */
        window.addEventListener('storage', (event) => {
            // Check if any importance key was changed
            const importanceKeys = Object.values(kpiConfig).map(config => config.importanceKey);
            if (importanceKeys.includes(event.key) || !event.key) {
                // Reinitialize dashboard on importance change
                initDashboard();
            }
        });

        // Initialize on page load
        window.addEventListener('load', initDashboard);

        // Reinitialize when page gains focus (returning from kg-i.html)
        window.addEventListener('focus', initDashboard);
    </script>
</body>
</html>
