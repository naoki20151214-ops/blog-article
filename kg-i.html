            // Filter out the default 3 KPIs (kpi_1, kpi_2, kpi_3)
            const customKpis = allKpis.filter(kpi => !['kpi_1', 'kpi_2', 'kpi_3'].includes(kpi.id));

            if (customKpis.length === 0) {
                container.innerHTML = '';
                return;
            }

            container.innerHTML = customKpis.map(kpi => `
                <div class="kpi-card">
                    <div class="kpi-header">
                        <div class="kpi-title-section">
                            <span class="kpi-name">${kpi.emoji || '📊'} ${kpi.name}</span>
                            <span class="kpi-importance" id="${kpi.id}-importance" onclick="toggleImportanceEdit('${kpi.id}')">${kpi.importance}</span>
                            <div class="importance-selector" id="${kpi.id}-importance-selector">
                                <button class="abc-option" onclick="saveImportanceLevel('${kpi.id}', 'A')">A</button>
                                <button class="abc-option" onclick="saveImportanceLevel('${kpi.id}', 'B')">B</button>
                                <button class="abc-option" onclick="saveImportanceLevel('${kpi.id}', 'C')">C</button>
                            </div>
                        </div>
                        <button class="importance-edit-btn" onclick="toggleImportanceEdit('${kpi.id}')">✏️</button>
                    </div>
                    <div class="progress-info">
                        <span id="${kpi.id}-progress">${kpi.current}</span> / ${kpi.target}${kpi.unit}
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="${kpi.id}-bar" style="width: ${Math.round((kpi.current / kpi.target) * 100)}%;">
                            <span id="${kpi.id}-percentage">${Math.round((kpi.current / kpi.target) * 100)}%</span>
                        </div>
                    </div>
                    <div class="subtasks-container" id="${kpi.id}-subtasks">
                        <div class="subtasks-header">
                            <span class="subtasks-label">サブタスク</span>
                            <button class="subtasks-toggle-btn" onclick="toggleSubtasksView('${kpi.id}')">▼</button>
                        </div>
                        <div class="subtasks-grid" id="${kpi.id}-subtasks-grid">
                            <!-- Rendered by JavaScript -->
                        </div>
                    </div>
                    <div class="kpi-controls">
                        <button class="control-btn" onclick="updateKPI('${kpi.id}', -1)">−</button>
                        <div class="current-value" id="${kpi.id}-display">${kpi.current}</div>
                        <button class="control-btn" onclick="updateKPI('${kpi.id}', 1)">＋</button>
                    </div>
                    <button class="detail-btn" onclick="openKPIDetailModal('${kpi.id}')" style="margin-top: 10px; padding: 10px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold;">詳細を見る</button>
                    <button class="delete-kpi-btn" onclick="deleteCustomKPI('${kpi.id}')" style="margin-top: 10px; padding: 8px; background: #ff6b6b; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%;">削除</button>
                </div>
            `).join('');

            // Render subtasks for custom KPIs
            customKpis.forEach(kpi => {
                renderCustomKPISubtasks(kpi.id);
            });
        }

        function renderCustomKPISubtasks(kpiId) {
            const kpi = configManager.getKPI(kpiId);
            if (!kpi) return;

            const tasks = configManager.getTasksByKPI(kpiId);
            const container = document.getElementById(`${kpiId}-subtasks-grid`);
            if (!container) return;

            if (tasks.length === 0) {
                container.innerHTML = '<div style="padding: 10px; color: #999;">タスクがありません</div>';
                return;
            }

            container.innerHTML = tasks.map((task, index) => `
                <label class="subtask-button" style="display: flex; align-items: center; padding: 8px; cursor: pointer; border-radius: 5px; background: ${task.completed ? '#d4edda' : '#f0f0f0'}; margin-bottom: 5px;">
                    <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleCustomKPISubtask('${kpiId}', '${task.id}')" style="margin-right: 8px;">
                    <span>${task.name}</span>
                </label>
            `).join('');
        }

        function toggleCustomKPISubtask(kpiId, taskId) {
            if (!kgiStore) return;

            try {
                const task = configManager.getTask(taskId);
                if (task) {
                    kgiStore.toggleTaskCompletion(taskId);
                    updateDisplay(kpiId, configManager.getKPI(kpiId).current);
                    updateKgiProgress();
                    renderCustomKPISubtasks(kpiId);
                }
            } catch (error) {
                console.error('Error toggling custom KPI subtask:', error);
            }
        }

        async function deleteCustomKPI(kpiId) {
            if (confirm('このKPIを削除してもよろしいですか？')) {
                try {
                    await configManager.deleteKPI(kpiId);
                    await loadKPIs();
                    alert('KPIを削除しました');
                } catch (error) {
                    console.error('Error deleting custom KPI:', error);
                    alert('削除エラー: ' + error.message);
                }
            }
        }

        // Close modal when clicking outside of it
        window.onclick = function(event) {
            const modal = document.getElementById('custom-kpi-modal');
            if (event.target === modal) {
                closeCustomKPIModal();
            }
            const detailModal = document.getElementById('kpi-detail-modal');
            if (event.target === detailModal) {
                closeKPIDetailModal();
            }
        }

        // ===== KPI DETAIL MODAL =====

        let currentDetailKPIId = null;

        function openKPIDetailModal(kpiId) {
            if (!configManager) return;

            currentDetailKPIId = kpiId;
            const modal = document.getElementById('kpi-detail-modal');

            // Get KPI data - try new system first, fallback to legacy
            let kpi = configManager.getKPI(kpiId);
            if (!kpi) {
                // For legacy KPIs, create a temporary object
                const legacyConfig = kpiConfig[kpiId];
                if (legacyConfig) {
                    const value = parseInt(localStorage.getItem(legacyConfig.storageKey)) || 0;
                    const importance = localStorage.getItem(legacyConfig.importanceKey) || 'B';
                    kpi = {
                        id: kpiId,
                        name: kpiId === 'vocab' ? '📚 英単語' : (kpiId === 'grammar' ? '📖 英文法' : '✏️ 過去問'),
                        emoji: kpiId === 'vocab' ? '📚' : (kpiId === 'grammar' ? '📖' : '✏️'),
                        target: legacyConfig.target,
                        current: value,
                        importance: importance,
                        unit: kpiId === 'vocab' ? '個' : (kpiId === 'grammar' ? '個' : '回')
                    };
                }
            }

            if (!kpi) {
                alert('KPIデータが見つかりません');
                return;
            }

            // Update modal header
            const emojiAndName = kpi.name || kpi.emoji + ' ' + kpiId;
            const parts = emojiAndName.split(' ');
            const emoji = parts[0];
            const name = parts.slice(1).join(' ') || kpiId;

            document.getElementById('detail-modal-emoji').textContent = emoji;
            document.getElementById('detail-modal-name').textContent = name;
            document.getElementById('detail-modal-importance').textContent = kpi.importance;

            // Update progress section
            const percentage = Math.round((kpi.current / kpi.target) * 100);
            document.getElementById('detail-progress').textContent = `${kpi.current} / ${kpi.target}${kpi.unit}`;
            document.getElementById('detail-progress-bar').style.width = percentage + '%';
            document.getElementById('detail-progress-percentage').textContent = percentage + '%';

            // Render all subtasks
            renderDetailSubtasks(kpiId, kpi);

            // Render progress history
            generateProgressHistory(kpiId);

            // Render task queue
            renderDetailTaskQueue(kpiId);

            // Render statistics
            generateKPIStatistics(kpiId, kpi);

            // Show first tab
            switchDetailTab('subtasks');

            // Show modal
            modal.classList.add('show');
        }

        function closeKPIDetailModal() {
            const modal = document.getElementById('kpi-detail-modal');
            modal.classList.remove('show');
            currentDetailKPIId = null;
        }

        function switchDetailTab(tabName) {
            // Hide all tabs
            document.getElementById('detail-subtasks-tab').style.display = 'none';
            document.getElementById('detail-history-tab').style.display = 'none';
            document.getElementById('detail-queue-tab').style.display = 'none';
            document.getElementById('detail-stats-tab').style.display = 'none';

            // Remove active state from all buttons
            document.querySelectorAll('.detail-tab-btn').forEach(btn => {
                btn.style.color = '#999';
                btn.style.borderBottom = 'none';
                btn.style.fontWeight = 'normal';
            });

            // Show selected tab
            document.getElementById('detail-' + tabName + '-tab').style.display = 'block';

            // Highlight selected button
            const buttons = document.querySelectorAll('.detail-tab-btn');
            const buttonLabels = ['サブタスク', '進捗履歴', 'タスクキュー', '統計情報'];
            const tabNames = ['subtasks', 'history', 'queue', 'stats'];
            const index = tabNames.indexOf(tabName);
            if (index >= 0) {
                buttons[index].style.color = '#667eea';
                buttons[index].style.borderBottom = '3px solid #667eea';
                buttons[index].style.fontWeight = 'bold';
            }
        }

        function renderDetailSubtasks(kpiId, kpi) {
            const container = document.getElementById('detail-all-subtasks');
            if (!container) return;

            // Get tasks for this KPI
            const tasks = configManager.getTasksByKPI(kpiId);

            if (tasks.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: #999;">サブタスクがありません</div>';
                return;
            }

            // Render all tasks
            container.innerHTML = tasks.map(task => `
                <label style="display: flex; align-items: center; padding: 12px; margin-bottom: 8px; background: ${task.completed ? '#d4edda' : '#f0f0f0'}; border-radius: 5px; cursor: pointer;">
                    <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleDetailSubtask('${kpiId}', '${task.id}')" style="margin-right: 12px; cursor: pointer;">
                    <span style="flex: 1; color: ${task.completed ? '#999' : '#333'}; text-decoration: ${task.completed ? 'line-through' : 'none'};">${task.name}</span>
                    ${task.completed ? '<span style="color: #999; font-size: 12px;">✓ 完了</span>' : ''}
                </label>
            `).join('');
        }

        function toggleDetailSubtask(kpiId, taskId) {
            if (!kgiStore) return;

            try {
                const task = configManager.getTask(taskId);
                if (task) {
                    kgiStore.toggleTaskCompletion(taskId);
                    updateDisplay(kpiId, configManager.getKPI(kpiId).current);
                    updateKgiProgress();
                    // Re-render subtasks
                    const kpi = configManager.getKPI(kpiId);
                    renderDetailSubtasks(kpiId, kpi);
                }
            } catch (error) {
                console.error('Error toggling detail subtask:', error);
            }
        }

        function generateProgressHistory(kpiId) {
            const history = getChangeHistory();
            const kpiHistory = history.filter(entry => entry.kpiId === kpiId).sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

            const container = document.getElementById('detail-history-timeline');
            if (!container) return;

            if (kpiHistory.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: #999;">進捗履歴がありません</div>';
                return;
            }

            // Display latest changes (reverse order, newest first)
            const displayHistory = kpiHistory.slice(-10).reverse();

            container.innerHTML = displayHistory.map(entry => {
                const date = new Date(entry.timestamp);
                const dateStr = date.toLocaleDateString('ja-JP', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                return `
                    <div style="padding: 10px; margin-bottom: 8px; background: white; border-left: 4px solid #667eea; border-radius: 3px;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-weight: bold;">${entry.oldValue} → ${entry.newValue}</span>
                            <span style="color: #999; font-size: 12px;">${dateStr}</span>
                        </div>
                        <div style="color: #666; font-size: 12px; margin-top: 4px;">更新理由: ${entry.source || 'unknown'}</div>
                    </div>
                `;
            }).join('');
        }

        function renderDetailTaskQueue(kpiId) {
            const container = document.getElementById('detail-queue-list');
            if (!container) return;

            // Get queue items for this KPI
            const queueStr = localStorage.getItem('kgi_task_queue') || '[]';
            const queue = JSON.parse(queueStr);
            const kpiQueue = queue.filter(item => item.kpiId === kpiId);

            if (kpiQueue.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: #999;">キューにタスクがありません</div>';
                return;
            }

            container.innerHTML = kpiQueue.map((item, index) => {
                const task = configManager.getTask(item.taskId);
                return `
                    <div style="padding: 12px; margin-bottom: 8px; background: white; border: 1px solid #e0e0e0; border-radius: 5px;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div style="flex: 1;">
                                <div style="font-weight: bold;">${index + 1}. ${task ? task.name : 'Unknown Task'}</div>
                                <div style="color: #999; font-size: 12px; margin-top: 4px;">キューに追加: ${new Date(item.addedAt).toLocaleDateString('ja-JP')}</div>
                            </div>
                            <button onclick="removeFromQueueDetail('${item.taskId}')" style="background: #ff6b6b; color: white; border: none; padding: 6px 12px; border-radius: 3px; cursor: pointer; font-size: 12px;">削除</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function removeFromQueueDetail(taskId) {
            try {
                const queueStr = localStorage.getItem('kgi_task_queue') || '[]';
                const queue = JSON.parse(queueStr);
                const newQueue = queue.filter(item => item.taskId !== taskId);
                localStorage.setItem('kgi_task_queue', JSON.stringify(newQueue));
                renderDetailTaskQueue(currentDetailKPIId);
                renderTaskQueue();
            } catch (error) {
                console.error('Error removing from queue:', error);
            }
        }

        function generateKPIStatistics(kpiId, kpi) {
            const history = getChangeHistory();
            const kpiHistory = history.filter(entry => entry.kpiId === kpiId).sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

            // Calculate completion rate
            const completionRate = Math.round((kpi.current / kpi.target) * 100);
            document.getElementById('detail-completion-rate').textContent = completionRate + '%';

            // Calculate daily average
            let dailyAvg = 0;
            if (kpiHistory.length > 0) {
                const firstDate = new Date(kpiHistory[0].timestamp);
                const lastDate = new Date(kpiHistory[kpiHistory.length - 1].timestamp);
                const daysElapsed = Math.max(1, (lastDate - firstDate) / (1000 * 60 * 60 * 24));
                dailyAvg = (kpi.current / daysElapsed).toFixed(2);
            }
            document.getElementById('detail-daily-avg').textContent = dailyAvg.toString();

            // Calculate streak (consecutive days with progress)
            let streak = 0;
            if (kpiHistory.length > 0) {
                const today = new Date();
                today.setHours(0, 0, 0, 0);

                let currentDate = new Date(today);
                let found = true;

                while (found) {
                    const dateStart = new Date(currentDate);
                    const dateEnd = new Date(currentDate);
                    dateEnd.setDate(dateEnd.getDate() + 1);

                    const dayChanges = kpiHistory.filter(entry => {
                        const entryDate = new Date(entry.timestamp);
                        return entryDate >= dateStart && entryDate < dateEnd;
                    });

                    if (dayChanges.length > 0) {
                        streak++;
                        currentDate.setDate(currentDate.getDate() - 1);
                    } else {
                        found = false;
                    }
                }
            }
            document.getElementById('detail-streak').textContent = streak + '日';

            // Last update
            if (kpiHistory.length > 0) {
                const lastUpdate = new Date(kpiHistory[kpiHistory.length - 1].timestamp);
                document.getElementById('detail-last-update').textContent = lastUpdate.toLocaleDateString('ja-JP') + '\n' + lastUpdate.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
            } else {
                document.getElementById('detail-last-update').textContent = '更新なし';
            }
        }

        document.addEventListener('DOMContentLoaded', loadKPIs);
    </script>
</body>
</html>
