<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KG I</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .navbar {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 16px;
            transition: color 0.3s;
        }
        .navbar a:hover {
            color: #667eea;
        }
        .navbar a.home {
            font-weight: bold;
            font-size: 18px;
        }
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .kgi-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #667eea;
            margin-top: 0;
            text-align: center;
            font-size: 32px;
        }
        .goal-section {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            color: white;
        }
        .goal-title {
            font-size: 24px;
            font-weight: bold;
            margin: 0;
        }
        .kpis-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }
        .kpi-card {
            background: #f9f9f9;
            padding: 25px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .kpi-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .kpi-name {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }
        .kpi-icon {
            font-size: 24px;
        }
        .progress-info {
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
            color: #666;
        }
        .progress-bar-container {
            background: #e0e0e0;
            border-radius: 10px;
            height: 25px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        .progress-bar {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }
        .kpi-controls {
            display: flex;
            justify-content: space-around;
            gap: 10px;
            align-items: center;
        }
        .control-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 5px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 5px rgba(102, 126, 234, 0.3);
        }
        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.5);
        }
        .control-btn:active {
            transform: translateY(0);
        }
        .current-value {
            min-width: 60px;
            text-align: center;
            font-weight: bold;
            color: #333;
        }
        .kpi-title-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .kpi-importance {
            font-size: 13px;
            color: #999;
            font-weight: normal;
            background: #f0f0f0;
            padding: 3px 8px;
            border-radius: 4px;
            min-width: 45px;
            text-align: center;
        }
        .kpi-importance.editing {
            display: none;
        }
        .importance-edit-input {
            width: 50px;
            padding: 4px 8px;
            border: 2px solid #667eea;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            display: none;
        }
        .importance-edit-input.visible {
            display: inline-block;
        }
        .importance-edit-input:focus {
            outline: none;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        }
        .importance-edit-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
            padding: 2px 6px;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .importance-edit-btn:hover {
            opacity: 1;
        }
        .reset-btn {
            width: 100%;
            padding: 12px;
            margin-top: 30px;
            background: #999;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .reset-btn:hover {
            background: #777;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="index.html" class="home">ホーム</a>
            <div>
                <a href="about.html">自己紹介</a>
                <a href="products.html">商品紹介</a>
                <a href="search-app.html">学生検索</a>
                <a href="todo-list.html">To Doリスト</a>
                <a href="kg-i.html">KG I</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="kgi-container">
            <h1>KG I試験対策</h1>

            <div class="goal-section">
                <p class="goal-title">🎯 来週のテストで100点を取る</p>
                <div style="margin-top: 20px;">
                    <p style="margin: 10px 0; font-size: 16px;">KGI全体進捗</p>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="kgi-bar" style="width: 0%;">
                            <span id="kgi-percentage">0%</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="kpis-grid">
                <!-- KPI 1: 英単語 -->
                <div class="kpi-card">
                    <div class="kpi-header">
                        <div class="kpi-title-section">
                            <span class="kpi-name">📚 英単語</span>
                            <span class="kpi-importance" id="vocab-importance">33%</span>
                            <input type="text" class="importance-edit-input" id="vocab-importance-input" />
                        </div>
                        <button class="importance-edit-btn" onclick="toggleImportanceEdit('vocab')">✏️</button>
                    </div>
                    <div class="progress-info">
                        <span id="vocab-progress">45</span> / 100個
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="vocab-bar" style="width: 45%;">
                            <span id="vocab-percentage">45%</span>
                        </div>
                    </div>
                    <div class="kpi-controls">
                        <button class="control-btn" onclick="updateKPI('vocab', -1)">−</button>
                        <div class="current-value" id="vocab-display">45</div>
                        <button class="control-btn" onclick="updateKPI('vocab', 1)">＋</button>
                    </div>
                </div>

                <!-- KPI 2: 英文法 -->
                <div class="kpi-card">
                    <div class="kpi-header">
                        <div class="kpi-title-section">
                            <span class="kpi-name">📖 英文法</span>
                            <span class="kpi-importance" id="grammar-importance">33%</span>
                            <input type="text" class="importance-edit-input" id="grammar-importance-input" />
                        </div>
                        <button class="importance-edit-btn" onclick="toggleImportanceEdit('grammar')">✏️</button>
                    </div>
                    <div class="progress-info">
                        <span id="grammar-progress">28</span> / 50ページ
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="grammar-bar" style="width: 56%;">
                            <span id="grammar-percentage">56%</span>
                        </div>
                    </div>
                    <div class="kpi-controls">
                        <button class="control-btn" onclick="updateKPI('grammar', -1)">−</button>
                        <div class="current-value" id="grammar-display">28</div>
                        <button class="control-btn" onclick="updateKPI('grammar', 1)">＋</button>
                    </div>
                </div>

                <!-- KPI 3: 過去問 -->
                <div class="kpi-card">
                    <div class="kpi-header">
                        <div class="kpi-title-section">
                            <span class="kpi-name">✏️ 過去問</span>
                            <span class="kpi-importance" id="practice-importance">34%</span>
                            <input type="text" class="importance-edit-input" id="practice-importance-input" />
                        </div>
                        <button class="importance-edit-btn" onclick="toggleImportanceEdit('practice')">✏️</button>
                    </div>
                    <div class="progress-info">
                        <span id="practice-progress">1</span> / 3回
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="practice-bar" style="width: 33.33%;">
                            <span id="practice-percentage">33%</span>
                        </div>
                    </div>
                    <div class="kpi-controls">
                        <button class="control-btn" onclick="updateKPI('practice', -1)">−</button>
                        <div class="current-value" id="practice-display">1</div>
                        <button class="control-btn" onclick="updateKPI('practice', 1)">＋</button>
                    </div>
                </div>
            </div>

            <button class="reset-btn" onclick="resetKPIs()">進捗をリセット</button>
        </div>
    </div>

    <script>
        const kpiConfig = {
            vocab: { target: 100, storageKey: 'kgi_vocab', importanceKey: 'kgi_importance_vocab' },
            grammar: { target: 50, storageKey: 'kgi_grammar', importanceKey: 'kgi_importance_grammar' },
            practice: { target: 3, storageKey: 'kgi_practice', importanceKey: 'kgi_importance_practice' }
        };

        const defaultImportance = {
            vocab: 33,
            grammar: 33,
            practice: 34
        };

        const initialValues = {
            vocab: 45,
            grammar: 28,
            practice: 1
        };

        function getImportancePercentages() {
            const importances = {};
            Object.keys(kpiConfig).forEach(kpiId => {
                const importanceKey = kpiConfig[kpiId].importanceKey;
                const stored = localStorage.getItem(importanceKey);
                importances[kpiId] = stored !== null ? parseInt(stored) : defaultImportance[kpiId];
            });
            return importances;
        }

        function calculateKgiProgress() {
            const importances = getImportancePercentages();
            let totalProgress = 0;
            Object.keys(kpiConfig).forEach(kpiId => {
                const storageKey = kpiConfig[kpiId].storageKey;
                const target = kpiConfig[kpiId].target;
                const current = parseInt(localStorage.getItem(storageKey) || initialValues[kpiId]);
                const progress = (current / target) * 100;
                const weight = importances[kpiId] / 100;
                totalProgress += progress * weight;
            });
            return Math.round(totalProgress);
        }

        function updateKgiProgress() {
            const kgiProgress = calculateKgiProgress();
            document.getElementById('kgi-bar').style.width = kgiProgress + '%';
            document.getElementById('kgi-percentage').textContent = kgiProgress + '%';
        }

        function loadImportances() {
            const allImportancesExist = Object.keys(kpiConfig).every(kpiId =>
                localStorage.getItem(kpiConfig[kpiId].importanceKey) !== null
            );

            if (!allImportancesExist) {
                Object.keys(kpiConfig).forEach(kpiId => {
                    const importanceKey = kpiConfig[kpiId].importanceKey;
                    if (localStorage.getItem(importanceKey) === null) {
                        localStorage.setItem(importanceKey, defaultImportance[kpiId]);
                    }
                });
            }
        }

        function loadKPIs() {
            loadImportances();
            Object.keys(kpiConfig).forEach(kpiId => {
                const storageKey = kpiConfig[kpiId].storageKey;
                const stored = localStorage.getItem(storageKey);
                const value = stored !== null ? parseInt(stored) : initialValues[kpiId];
                updateDisplay(kpiId, value);
                updateImportanceDisplay(kpiId);
            });
            updateKgiProgress();
        }

        function updateKPI(kpiId, delta) {
            const config = kpiConfig[kpiId];
            const storageKey = config.storageKey;
            const target = config.target;

            let current = parseInt(localStorage.getItem(storageKey) || initialValues[kpiId]);
            current = Math.max(0, Math.min(target, current + delta));

            localStorage.setItem(storageKey, current);
            updateDisplay(kpiId, current);
            updateKgiProgress();
        }

        function updateDisplay(kpiId, value) {
            const config = kpiConfig[kpiId];
            const target = config.target;
            const percentage = Math.round((value / target) * 100);

            document.getElementById(`${kpiId}-display`).textContent = value;
            document.getElementById(`${kpiId}-progress`).textContent = value;
            document.getElementById(`${kpiId}-bar`).style.width = percentage + '%';
            document.getElementById(`${kpiId}-percentage`).textContent = percentage + '%';
        }

        function validateAndAdjustImportances(changedKpi, newValue) {
            const newVal = parseInt(newValue);
            if (isNaN(newVal) || newVal < 1 || newVal > 99) {
                return null;
            }

            const currentImportances = getImportancePercentages();
            const otherKpis = Object.keys(kpiConfig).filter(id => id !== changedKpi);
            const otherTotal = 100 - newVal;

            const currentOtherTotal = otherKpis.reduce((sum, id) => sum + currentImportances[id], 0);

            const adjustedImportances = { [changedKpi]: newVal };

            if (currentOtherTotal > 0) {
                const scaleFactor = otherTotal / currentOtherTotal;
                otherKpis.forEach(kpiId => {
                    adjustedImportances[kpiId] = Math.round(currentImportances[kpiId] * scaleFactor);
                });
            } else {
                const perKpi = Math.floor(otherTotal / otherKpis.length);
                const remainder = otherTotal % otherKpis.length;
                otherKpis.forEach((kpiId, index) => {
                    adjustedImportances[kpiId] = perKpi + (index < remainder ? 1 : 0);
                });
            }

            let sum = Object.values(adjustedImportances).reduce((a, b) => a + b, 0);
            if (sum !== 100) {
                const largestKpiId = otherKpis.reduce((maxId, id) =>
                    adjustedImportances[id] > adjustedImportances[maxId] ? id : maxId
                );
                adjustedImportances[largestKpiId] += (100 - sum);
            }

            return adjustedImportances;
        }

        function saveImportancePercentage(kpiId, newValue) {
            const adjusted = validateAndAdjustImportances(kpiId, newValue);

            if (adjusted === null) {
                alert('重要度は1%以上99%以下の整数で入力してください。');
                document.getElementById(`${kpiId}-importance-input`).classList.remove('visible');
                document.getElementById(`${kpiId}-importance`).classList.remove('editing');
                return;
            }

            Object.keys(adjusted).forEach(adjustedKpiId => {
                const importanceKey = kpiConfig[adjustedKpiId].importanceKey;
                localStorage.setItem(importanceKey, adjusted[adjustedKpiId]);
                updateImportanceDisplay(adjustedKpiId);
            });

            document.getElementById(`${kpiId}-importance-input`).classList.remove('visible');
            document.getElementById(`${kpiId}-importance`).classList.remove('editing');

            const inputElements = document.querySelectorAll('.importance-edit-input');
            inputElements.forEach(input => {
                input.removeEventListener('keydown', arguments.callee);
                input.removeEventListener('blur', arguments.callee);
            });

            updateKgiProgress();
        }

        function updateImportanceDisplay(kpiId) {
            const importances = getImportancePercentages();
            const importance = importances[kpiId];
            document.getElementById(`${kpiId}-importance`).textContent = importance + '%';
        }

        function toggleImportanceEdit(kpiId) {
            const importanceSpan = document.getElementById(`${kpiId}-importance`);
            const importanceInput = document.getElementById(`${kpiId}-importance-input`);

            if (importanceInput.classList.contains('visible')) {
                importanceInput.classList.remove('visible');
                importanceSpan.classList.remove('editing');
            } else {
                const currentValue = getImportancePercentages()[kpiId];
                importanceInput.value = currentValue;
                importanceInput.classList.add('visible');
                importanceSpan.classList.add('editing');
                importanceInput.focus();
                importanceInput.select();

                const saveImportance = () => {
                    saveImportancePercentage(kpiId, importanceInput.value);
                };

                const handleKeyDown = (e) => {
                    if (e.key === 'Enter') {
                        saveImportance();
                    } else if (e.key === 'Escape') {
                        importanceInput.classList.remove('visible');
                        importanceSpan.classList.remove('editing');
                        importanceInput.removeEventListener('keydown', handleKeyDown);
                        importanceInput.removeEventListener('blur', handleBlur);
                    }
                };

                const handleBlur = () => {
                    saveImportance();
                };

                importanceInput.addEventListener('keydown', handleKeyDown);
                importanceInput.addEventListener('blur', handleBlur);
            }
        }

        function resetKPIs() {
            if (confirm('進捗とタスク重要度をリセットしてもよろしいですか？')) {
                Object.keys(kpiConfig).forEach(kpiId => {
                    const storageKey = kpiConfig[kpiId].storageKey;
                    const importanceKey = kpiConfig[kpiId].importanceKey;
                    localStorage.removeItem(storageKey);
                    localStorage.removeItem(importanceKey);
                    localStorage.setItem(importanceKey, defaultImportance[kpiId]);
                    updateDisplay(kpiId, initialValues[kpiId]);
                    updateImportanceDisplay(kpiId);
                });
                updateKgiProgress();
            }
        }

        document.addEventListener('DOMContentLoaded', loadKPIs);
    </script>
</body>
</html>
