<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品紹介</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .navbar {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 16px;
            transition: color 0.3s;
        }
        .navbar a:hover {
            color: #667eea;
        }
        .navbar a.home {
            font-weight: bold;
            font-size: 18px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .products-title {
            color: white;
            text-align: center;
            font-size: 32px;
            margin-bottom: 40px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .product-card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            transition: transform 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
        }
        .product-name {
            color: #667eea;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .product-description {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="index.html" class="home">ホーム</a>
            <div>
                <a href="about.html">自己紹介</a>
                <a href="products.html">商品紹介</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="products-title">商品紹介</h1>
        <div class="products-grid">
            <div class="product-card">
                <div class="product-name">商品A</div>
                <p class="product-description">
                    高品質で信頼性の高い商品です。多くのお客様に愛用いただいています。
                </p>
            </div>
            <div class="product-card">
                <div class="product-name">商品B</div>
                <p class="product-description">
                    最新技術を採用した革新的な商品です。様々なニーズにお応えします。
                </p>
            </div>
            <div class="product-card">
                <div class="product-name">商品C</div>
                <p class="product-description">
                    お手頃な価格で高性能を実現した商品です。どなたにもお勧めできます。
                </p>
            </div>
        </div>
    </div>
</body>
</html>
