<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Doリスト</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .navbar {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 16px;
            transition: color 0.3s;
        }
        .navbar a:hover {
            color: #667eea;
        }
        .navbar a.home {
            font-weight: bold;
            font-size: 18px;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: calc(100vh - 60px);
            padding: 40px 20px;
        }
        .todo-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #667eea;
            margin-top: 0;
            text-align: center;
            font-size: 32px;
        }
        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .input-section input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .input-section input:focus {
            outline: none;
            border-color: #667eea;
        }
        .add-button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .add-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        .add-button:active {
            transform: translateY(0);
        }
        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .todo-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background-color: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
        .todo-item:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            background-color: #f5f5f5;
        }
        .todo-item.completed {
            background-color: #e8f5e9;
        }
        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #999;
        }
        .todo-checkbox {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            cursor: pointer;
            accent-color: #667eea;
        }
        .todo-text {
            flex: 1;
            font-size: 16px;
            color: #333;
        }
        .delete-button {
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s, transform 0.3s;
            padding: 0;
        }
        .delete-button:hover {
            background: #ff5252;
            transform: scale(1.1);
        }
        .empty-message {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="index.html" class="home">ホーム</a>
            <div>
                <a href="about.html">自己紹介</a>
                <a href="products.html">商品紹介</a>
                <a href="search-app.html">学生検索</a>
                <a href="todo-list.html">To Doリスト</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="todo-container">
            <h1>To Doリスト</h1>

            <div class="input-section">
                <input
                    type="text"
                    id="todoInput"
                    placeholder="新しいTo Doを入力してください..."
                    autocomplete="off"
                >
                <button class="add-button" onclick="addTodo()">追加</button>
            </div>

            <ul class="todo-list" id="todoList">
            </ul>
            <div class="empty-message" id="emptyMessage">
                To Doを追加して、タスクを管理しましょう！
            </div>
        </div>
    </div>

    <script>
        // Load todos from localStorage when page loads
        function loadTodos() {
            const todos = JSON.parse(localStorage.getItem('todos')) || [];
            renderTodos(todos);
        }

        // Render todos to the list
        function renderTodos(todos) {
            const todoList = document.getElementById('todoList');
            const emptyMessage = document.getElementById('emptyMessage');

            todoList.innerHTML = '';

            if (todos.length === 0) {
                emptyMessage.style.display = 'block';
                return;
            }

            emptyMessage.style.display = 'none';

            todos.forEach((todo, index) => {
                const li = document.createElement('li');
                li.className = 'todo-item' + (todo.completed ? ' completed' : '');

                li.innerHTML = `
                    <input
                        type="checkbox"
                        class="todo-checkbox"
                        ${todo.completed ? 'checked' : ''}
                        onchange="toggleTodo(${index})"
                    >
                    <span class="todo-text">${escapeHtml(todo.text)}</span>
                    <button class="delete-button" onclick="deleteTodo(${index})">×</button>
                `;

                todoList.appendChild(li);
            });
        }

        // Add a new todo
        function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();

            if (text === '') {
                alert('To Doを入力してください！');
                return;
            }

            const todos = JSON.parse(localStorage.getItem('todos')) || [];
            todos.push({
                text: text,
                completed: false
            });

            localStorage.setItem('todos', JSON.stringify(todos));
            input.value = '';
            input.focus();
            renderTodos(todos);
        }

        // Toggle todo completion status
        function toggleTodo(index) {
            const todos = JSON.parse(localStorage.getItem('todos')) || [];
            todos[index].completed = !todos[index].completed;
            localStorage.setItem('todos', JSON.stringify(todos));
            renderTodos(todos);
        }

        // Delete a todo
        function deleteTodo(index) {
            const todos = JSON.parse(localStorage.getItem('todos')) || [];
            todos.splice(index, 1);
            localStorage.setItem('todos', JSON.stringify(todos));
            renderTodos(todos);
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Allow Enter key to add todo
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('todoInput').addEventListener('keypress', function(event) {
                if (event.key === 'Enter') {
                    addTodo();
                }
            });

            loadTodos();
        });
    </script>
</body>
</html>
